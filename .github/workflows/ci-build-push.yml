# jit-hub-app/.github/workflows/ci-build-push.yml
name: build-and-push

on:
  push:
    branches: [master]
    paths:
      - "services/**"
      - "gateway/**"
      - "static/**"
      - ".github/workflows/ci-build-push.yml"

# 같은 브랜치에서 CI가 겹쳐도 병렬 유지
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # 1) 변경된 서비스만 골라내기 (changed service detection)
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 이전 커밋과 diff 필요

      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'services/auth/**'
            weather:
              - 'services/weather/**'
            traffic:
              - 'services/traffic/**'
            tourist:
              - 'services/tourist/**'
            gateway:
              - 'gateway/**'
              - 'static/**'

      - id: set
        run: |
          items=()
          # service명, harbor 이미지명(repo), dockerfile 경로를 함께 담는다
          [ "${{ steps.changes.outputs.auth }}"    = "true" ] && items+=('{"svc":"auth","image":"auth-service","dockerfile":"services/auth/Dockerfile"}')
          [ "${{ steps.changes.outputs.weather }}" = "true" ] && items+=('{"svc":"weather","image":"weather-service","dockerfile":"services/weather/Dockerfile"}')
          [ "${{ steps.changes.outputs.traffic }}" = "true" ] && items+=('{"svc":"traffic","image":"traffic-service","dockerfile":"services/traffic/Dockerfile"}')
          [ "${{ steps.changes.outputs.tourist }}" = "true" ] && items+=('{"svc":"tourist","image":"tourist-service","dockerfile":"services/tourist/Dockerfile"}')
          [ "${{ steps.changes.outputs.gateway }}" = "true" ] && items+=('{"svc":"gateway","image":"jit-hub-gateway","dockerfile":"gateway/Dockerfile"}')
          if [ ${#items[@]} -eq 0 ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
            printf 'matrix={"include":[%s]}\n' "$(IFS=,; echo "${items[*]}")" >> "$GITHUB_OUTPUT"
          fi

  # 2) 변경 서비스만 build & push
  build:
    needs: detect
    # 변경 없으면 실행 안 함
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      # SHA short tag 생성
      - name: Set short SHA
        id: vars
        run: echo "sha=$(echo ${GITHUB_SHA} | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # Harbor 로그인 (HTTPS 도메인, robot account)
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.HARBOR_HOST }}          # harbor.ccmall.shop
          username: ${{ secrets.HARBOR_USERNAME }}    # robot$jit-hub+ci
          password: ${{ secrets.HARBOR_PASSWORD }}    # robot token

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .                                  # 반드시 루트 컨텍스트
          file: ${{ matrix.dockerfile }}              # -f 로 Dockerfile만 지정
          push: true
          provenance: false
          tags: |
            ${{ vars.HARBOR_HOST }}/${{ vars.HARBOR_PROJECT }}/${{ matrix.image }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) infra repo values 갱신 (build 성공 후 1회)
  bump:
    # detect, build 둘 다 성공, 변경 서비스가 있을때만 실행
    needs: [detect, build]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    env:
      #INFRA_BRANCH: master
      INFRA_BRANCH: test/ci-cd # ci-cd 테스트용 브랜치 (26.07.21 2100)
    steps:
      - name: Set short SHA
        id: vars
        run: echo "sha=$(echo ${GITHUB_SHA} | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: hacksungboo/jit-hub-infra  # 각자 저장소로 수정 필요
          ref: ${{ env.INFRA_BRANCH }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}      # PAT (repo write)
          path: infra

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tags in infra values (onprem + eks-a)
        working-directory: infra
        env:
          SHA: ${{ steps.vars.outputs.sha }}
          MATRIX: ${{ needs.detect.outputs.matrix }}
        # detect job이 만든 matrix.include 의 svc 목록만 갱신
        # 업데이트 대상 파일:
        #     gitops/values/onprem/jit-hub-values.yaml
        #     gitops/values/eks-a/jit-hub-values.yaml
        # 해당 서비스의 svc.image.tag 값을 변경
        # auth:
        #   image:
        #     tag: old  (before)
        # auth:
        #   image:
        #     tag: abc123def456  (after)
        run: |
          svcs=$(echo "$MATRIX" | yq -p=json '.include[].svc')
          for env in onprem eks-a; do
            f="gitops/values/${env}/jit-hub-values.yaml"
            for svc in $svcs; do
              yq -i ".${svc}.image.tag = \"${SHA}\"" "$f"
              echo "updated ${f}: ${svc}.image.tag=${SHA}"
            done
          done

      - name: Commit & push
        working-directory: infra
        env:
          INFRA_BRANCH: ${{ env.INFRA_BRANCH }}
        run: |
          git config user.name  "jithub-ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add gitops/values/onprem/jit-hub-values.yaml gitops/values/eks-a/jit-hub-values.yaml
          if git diff --cached --quiet; then
            echo "no value change"; exit 0
          fi
          git commit -m "ci: bump image tag to ${{ steps.vars.outputs.sha }} (from app@${GITHUB_SHA::7})"
          git push origin HEAD:${INFRA_BRANCH}