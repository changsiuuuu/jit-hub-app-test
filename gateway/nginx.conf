server {
    listen 80;

    # 정적 파일 (Nginx가 직접 서빙)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        try_files $uri $uri/ =404;
    }

    # 루트 → 로그인 페이지
    location = / {
        return 301 /static/login.html;
    }

    # Auth 서비스
    location /auth/ {
        proxy_pass http://auth-service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health 엔드포인트 (auth 서비스)
    location /health {
        proxy_pass http://auth-service:8001;
        proxy_set_header Host $host;
    }

    # Weather API (v1)
    location /api/v1/ {
        proxy_pass http://weather-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Traffic API (v2)
    location /api/v2/ {
        proxy_pass http://traffic-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Tourist API (v3)
    location /api/v3/ {
        proxy_pass http://tourist-service:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
