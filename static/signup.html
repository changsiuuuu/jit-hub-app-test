<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>JIT-Hub | 회원가입</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }
    nav { background: #1a1a2e; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
    nav .logo { color: #fff; font-size: 20px; font-weight: 700; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; }
    nav a:hover { color: #fff; }
    .container { flex: 1; display: flex; justify-content: center; align-items: center; }
    .card { background: #fff; border-radius: 12px; padding: 40px; width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .card h2 { margin-bottom: 24px; font-size: 22px; color: #1a1a2e; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    input:focus { outline: none; border-color: #4a90e2; }
    .btn { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #2d2d5e; }
    .links { margin-top: 16px; font-size: 13px; text-align: center; }
    .links a { color: #4a90e2; text-decoration: none; }
    .error { color: #e74c3c; font-size: 13px; margin-top: 8px; display: none; }
    .success { color: #27ae60; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">JIT-Hub</span>
    <a href="/static/login.html">API 사용</a>
    <a href="/static/dashboard.html">대시보드</a>
    <a href="/static/login.html">로그인</a>
  </nav>
  <div class="container">
    <div class="card">
      <h2>회원가입</h2>
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="name" placeholder="이름 입력">
      </div>
      <div class="form-group">
        <label>아이디 (이메일)</label>
        <input type="email" id="email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력">
      </div>
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" id="password2" placeholder="비밀번호 재입력">
      </div>
      <p class="error" id="error-msg"></p>
      <p class="success" id="success-msg"></p>
      <button class="btn" onclick="signup()">확인</button>
      <div class="links">
        <a href="/static/login.html">이미 계정이 있으신가요? 로그인</a>
      </div>
    </div>
  </div>

  <script>
    async function signup() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (password !== password2) {
        errorMsg.textContent = '비밀번호가 일치하지 않습니다.';
        errorMsg.style.display = 'block';
        return;
      }

      const res = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, name })
      });

      if (res.ok) {
        successMsg.textContent = '회원가입이 완료되었습니다. 로그인 페이지로 이동합니다.';
        successMsg.style.display = 'block';
        setTimeout(() => window.location.href = '/static/login.html', 1500);
      } else {
        const err = await res.json();
        errorMsg.textContent = err.detail || '회원가입에 실패했습니다.';
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
